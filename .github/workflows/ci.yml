name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Fuzz smoke
        run: |
          go test -run '^$' -fuzz FuzzCompile$ -fuzztime 20s .
          go test -run '^$' -fuzz FuzzCompileAndRender -fuzztime 20s .
